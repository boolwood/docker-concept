# version '3.8'
services:
  backend:
   build: backend
   hostname: backend-host
  
   ports:
     - "8000:8000"
   networks:
     - ares-networks

  frontend:
   build: frontend
   hostname: frontend-host
   
   environment: 
     -  BACKEND_URL=http://backend-host:8000/api

   ports:
     - "3000:3000"
   links:
     - backend
   depends_on:
     - backend
   networks:
     - ares-networks

networks:
  ares-networks: {}
